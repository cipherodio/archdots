#         preset = "disappear";
#         scale = 0.2;
#         duration = 0.2;
#     }
# )

# General Settings
backend = "glx";
dithered-present = false;
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = false;
log-level = "warn";

# Rules
rules: (
    {
        match = "class_g = 'Alacritty' && !focused";
        dim = 0.2;
    }
)
