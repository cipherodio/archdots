<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
    <alias>
        <family>serif</family>
        <prefer>
            <family>Libertinus Serif</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Libertinus Sans</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <alias>
        <family>sans</family>
        <prefer>
            <family>Libertinus Sans</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <alias>
        <family>monospace</family>
        <prefer>
            <family>Iosevka Nerd Font</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>

    <!--
    Needed to have a better output of color icons in lf file manager.
    Scale Noto Color Emoji only for Alacritty so it does not affect rofi.
    Using 'pixelsize' with 'times' allows the emoji size to remain
    relative to the main font during zooming. Uncomment below if you want
    to use color icons in lf file manager.
