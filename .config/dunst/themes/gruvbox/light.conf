[global]
    frame_color = "#458588"
    separator_color = frame

[urgency_low]
    background = "#fbf1c7"
    foreground = "#3c3836"
    highlight = "#b57614"
    timeout = 3

[urgency_normal]
    background = "#fbf1c7"
    foreground = "#3c3836"
    timeout = 5

[urgency_critical]
    background = "#fbf1c7"
    foreground = "#3c3836"
    frame_color = "#cc241d"
    timeout = 10
