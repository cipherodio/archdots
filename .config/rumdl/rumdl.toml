[global]
disable = [
  "MD036",  # Allow bold/italic text to be used as heading
  "MD032",  # No space between header and content
  "MD022",  # Allow headings without blank lines above or below
  "MD047"  # Do not require newline at the end of the file
]

[MD013]
line-length = 72
code-blocks = false
reflow = true
# reflow-mode = "normalize"
reflow-mode = "default"
tables = false

# Indent list next line
[MD077]
style = "aligned"

[MD060]
enabled = true
style = "aligned"

# Generate toc
[MD073]
enabled = true

[MD007]
indent = 4

[MD051]
anchor-style = "github"

[MD033]
allowed-elements = ["details"]
